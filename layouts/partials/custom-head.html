<!-- FAQ Schema for Rich Snippets -->
<script type="application/ld+json">

      "@type": "Question",
      "name": "What's the cost of a NIS2 gap assessment?",

        "@type": "Answer",
        "text": "Cost depends on your organization size, sector classification (essential vs. important), and systems in scope. I provide a transparent fixed quote after a free 30-minute scoping call. No obligation, no sales layer."
      }
    },
    {
      "@type": "Question",
      "name": "How long does a NIS2 audit take?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "A typical gap assessment runs 4–6 weeks: Weeks 1–2 (scoping & evidence), Weeks 3–4 (assessment & testing), Weeks 5–6 (findings & remediation roadmap). Larger organizations or multi-site deployments may run 8–10 weeks."
      }
    },
    {
      "@type": "Question",
      "name": "Do you work with SMEs or only large enterprises?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Both. NIS2's \"important entity\" tier is built around mid-sized companies, and the engagement scales to your size: a 50-person company gets a tightly scoped assessment, not an enterprise-shaped process."
      }
    },
    {
      "@type": "Question",
      "name": "What if we're not sure if NIS2 applies to us?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "That's a free conversation. Email me your organization's size, sector, and main services. I'll tell you if NIS2 covers you, by what date, and what your first step should be. No obligation."
      }
    },
    {
      "@type": "Question",
      "name": "Can you help with incident response training?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Yes. I run incident-response tabletop exercises tailored to your sector and threat model, and I can help build or review your incident-response plan to meet NIS2 requirements."
      }
    }
  ]
}
</script>
