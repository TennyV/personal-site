# Main body sections

    # You may use markdown in summary, details and intro fields. But don't overdose, it's resume!:)

    # Summary section
    [params.summary]
        enable = true
        icon = "fa-user"
        title = "Professional Summary"
        title_pl = "Profesjonalne Streszczenie"
        summary = "I audit organizations against NIS2 requirements and architect the Zero Trust roadmaps that close the gaps. GIAC-certified across eight domains, including Defensible Security Architecture (GDSA, Zero Trust) and Cloud Security Automation (GCSA, earned with honors), with 10+ years of security work spanning U.S. federal agencies, financial services, and EU environments.\n\n**If your organization falls under NIS2 and you want a gap assessment or a Zero Trust architecture review, email me directly. No intake forms, no sales layer. You talk to the auditor.**"
        summary_pl = "Przeprowadzam audyty organizacji pod kątem wymagań NIS2 i architektury Zero Trust zamykające luki bezpieczeństwa. Certyfikowany GIAC w ośmiu domenach, w tym Defensible Security Architecture (GDSA, Zero Trust) i Cloud Security Automation (GCSA, uzyskany z wyróżnieniem), z ponad 10-letnim doświadczeniem w bezpieczeństwie w agencjach federalnych USA, usługach finansowych i środowiskach europejskich.\n\n**Jeśli Twoja organizacja podlega NIS2 i chcesz oceny luk lub przeglądu architektury Zero Trust, napisz do mnie bezpośrednio. Żadnych formularzy wstępnych, brak warstwy sprzedaży. Rozmawiam z audytorem.**"

    # Why NIS2 Now section
    [params.nis2]
        enable = true
        icon = "fa-clock-o"
        title = "Why NIS2, Why Now"
        title_pl = "Dlaczego NIS2, Dlaczego Teraz"
        content = "**The law is already in force.** Poland's amended National Cybersecurity System Act (the KSC Act), which implements NIS2, took effect on April 3, 2026. It covers roughly 42,000 companies across 18 sectors: energy, transport, banking, healthcare, digital infrastructure, manufacturing, public administration, and more.\n\n**The deadlines are close.**\n\n- **October 3, 2026**: covered entities must self-identify and register with the authorities.\n- **April 2027**: risk-management measures, security controls, and incident-reporting processes must be fully in place.\n- **April 2028**: first mandatory security audits.\n\n**The penalties are real.** Fines reach 10 million EUR or 2% of global turnover for essential entities, and management can be held personally liable for compliance failures.\n\nIf you have not yet confirmed whether your organization is covered, that is the first conversation to have. It costs you one email."
        content_pl = "**Prawo jest już w mocy.** Nowelizowana polska Ustawa o Krajowym Systemie Cyberbezpieczeństwa (Ustawa KSC), która wdraża NIS2, weszła w życie 3 kwietnia 2026 r. Obejmuje około 42 000 firm w 18 sektorach: energetyka, transport, bankowość, opieka zdrowotna, infrastruktura cyfrowa, produkcja, administracja publiczna i inne.\n\n**Terminy są bliskie.**\n\n- **3 października 2026 r.**: podmioty objęte muszą się zidentyfikować i zarejestrować u władz.\n- **Kwiecień 2027**: środki zarządzania ryzykiem, kontrole bezpieczeństwa i procesy raportowania incydentów muszą być w pełni wdrożone.\n- **Kwiecień 2028**: pierwsze obowiązkowe audyty bezpieczeństwa.\n\n**Kary są rzeczywiste.** Grzywny sięgają 10 milionów EUR lub 2% światowego obrotu dla podmiotów istotnych, a kierownictwo może być osobiście odpowiedzialne za niepowodzenie w zakresie zgodności.\n\nJeśli nie potwierdzono jeszcze, czy Twoja organizacja jest objęta, to jest pierwsza rozmowa do przeprowadzenia. Kosztuje cię jedną wiadomość e-mail."

    # How I Can Help section
    [params.help]
        enable = true
        icon = "fa-shield"
        title = "How I Can Help Your Organization"
        title_pl = "Jak Mogę Pomóc Twojej Organizacji"
        content = "**NIS2 gap assessment.** I map your current controls against the directive's risk-management measures and incident-reporting duties, then deliver a prioritized, evidence-based findings report your leadership can act on.\n\n**Zero Trust architecture review and roadmap.** Target architectures grounded in NIST SP 800-207 and defensible security architecture principles: identity, network segmentation, least-privilege access, and monitoring, sequenced so each step reduces real risk.\n\n**Penetration testing and full-access audits.** GWAPT-certified (with honors) web application testing with OWASP Top Ten coverage, plus full-access (white-box) audits that show what a malicious insider or compromised account could actually reach: identity permissions, lateral movement paths, and sensitive data exposure. Clear remediation reports your teams can act on, with findings that map back to your compliance evidence, not a theatrical red-team exercise.\n\n**Audit readiness.** Documentation, evidence collection, POA&M management, and incident-response tabletop exercises, so the real assessment holds no surprises.\n\n**Cloud and identity security.** Hands-on reviews of Azure, AWS, and Microsoft Entra ID environments, from account audits to vulnerability management programs.\n\n**Frameworks I work in:** NIS2, DORA, GDPR (Article 32 security measures), the EU Cyber Resilience Act, ISO/IEC 27001, NIST Cybersecurity Framework, NIST SP 800-53, NIST SP 800-207 (Zero Trust), CIS Critical Security Controls, and the OWASP Top Ten."
        content_pl = "**Ocena luk NIS2.** Mapuję Twoje obecne kontrole w stosunku do miar zarządzania ryzykiem dyrektywy i obowiązków raportowania incydentów, a następnie dostarczam priorytetowy, oparty na dowodach raport z ustaleniami, na które Twoje kierownictwo może działać.\n\n**Przegląd architektury Zero Trust i mapa drogowa.** Architektura docelowa oparta na NIST SP 800-207 i zasadach defensywnej architektury bezpieczeństwa: tożsamość, segmentacja sieci, dostęp z najmniejszymi uprawnieniami i monitorowanie, zaplanowane tak, aby każdy krok zmniejszał rzeczywiste ryzyko.\n\n**Testowanie penetracyjne i audyty z pełnym dostępem.** Testowanie aplikacji internetowych certyfikowane GWAPT (z wyróżnieniem) z pokryciem OWASP Top Ten, plus audyty z pełnym dostępem (white-box) pokazujące, co rzeczywiście mogą osiągnąć złośliwy insider lub skompromitowane konto: uprawnienia tożsamości, ścieżki ruchu bocznego i ekspozycja czułych danych. Jasne raporty o środkach naprawczych, na które Twoje zespoły mogą działać, z ustaleniami odwzorowanymi na dowodach zgodności, a nie na ćwiczeniu red-team.\n\n**Gotowość do audytu.** Dokumentacja, zbieranie dowodów, zarządzanie POA&M i ćwiczenia symulujące reagowanie na incydenty, aby rzeczywista ocena nie niosła żadnych niespodzianek.\n\n**Bezpieczeństwo chmury i tożsamości.** Praktyczne przeglądy środowisk Azure, AWS i Microsoft Entra ID, od audytów kont do programów zarządzania lukami w zabezpieczeniach.\n\n**Ramy, w których pracuję:** NIS2, DORA, GDPR (artykuł 32 – środki bezpieczeństwa), Ustawa UE o odporności cybernetycznej, ISO/IEC 27001, Framework Cyberbezpieczeństwa NIST, NIST SP 800-53, NIST SP 800-207 (Zero Trust), CIS Critical Security Controls i OWASP Top Ten."

    # Typical engagement section
    [params.engagement]
        enable = true
        icon = "fa-calendar-check-o"
        title = "A Typical NIS2 Engagement"
        title_pl = "Typowe Zaangażowanie NIS2"
        content = "Most gap assessments run four to six weeks, scoped to your size and sector.\n\n**Weeks 1-2: Scoping and evidence.** Confirm your entity classification (essential or important), map the systems in scope, and collect existing policies, registers, and evidence.\n\n**Weeks 3-4: Assessment.** Controls review against the KSC Act's risk-management measures, identity and access audit, and validation testing where agreed.\n\n**Weeks 5-6: Findings and roadmap.** Prioritized findings report, a remediation roadmap with owners and timelines, and an executive briefing for management.\n\nYou end with three things: a gap register mapped to the law's requirements, a board-ready summary, and a remediation plan your team can execute alone or with my help."
        content_pl = "Większość ocen luk trwa od czterech do sześciu tygodni, zakreślona do Twojego rozmiaru i sektora.\n\n**Tygodnie 1-2: Zakres i dowody.** Potwierdź klasyfikację jednostki (istotna lub ważna), zmapuj systemy objęte zakresem i zbierz istniejące polityki, rejestry i dowody.\n\n**Tygodnie 3-4: Ocena.** Przegląd kontroli w stosunku do miar zarządzania ryzykiem ustawy KSC, audyt tożsamości i dostępu oraz testowanie sprawdzające w razie potrzeby.\n\n**Tygodnie 5-6: Ustalenia i mapa drogowa.** Priorytetowy raport z ustaleniami, mapa drogowa remediation z właścicielami i harmonogramami oraz briefing dla kierownictwa.\n\nKończy się trzema rzeczami: rejestr luk zmapowany do wymogów prawa, streszczenie gotowe dla zarządu i plan naprawy, który Twój zespół może wykonać sam lub przy mojej pomocy."

