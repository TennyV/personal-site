    # Summary section
    [params.summary]
        enable = true
        icon = "fa-user"
        title = "Professional Summary"
        summary = "Cybersecurity specialist and DevSecOps practitioner with 10+ years across federal agencies, financial services, and international environments. I build security into the places most teams skip: CI/CD pipelines, cloud identity, and developer workflows. Currently interning at Decyda SRLS in Poland, where I deploy Cloud Custodian on AWS and integrate AI-based guardrails into pipelines. Previously at the Department of the Interior, where I automated phishing triage, integrated SAST/SCA into Azure DevOps and GitHub Actions, and built Splunk queries that improved anomaly detection by 30%. Pursuing a Master's in Information Security Engineering at SANS Technology Institute, with active research into how NIST SP 800-204D maps to real federal CI/CD pipeline risks. GIAC-certified across five domains."

